<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Price Checker</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0z"/>
      </svg>
      Steam Price Checker
    </div>
    <div class="header-search">
      <input type="search" id="header-input" placeholder="Buscar juego..." autocomplete="off" spellcheck="false">
      <span class="search-icon">&#9906;</span>
    </div>
    <select class="currency-select" id="cc-select" title="Región / Moneda">
      <option value="US">🇺🇸 USD</option>
      <option value="PE">🇵🇪 PEN</option>
      <option value="AR">🇦🇷 ARS</option>
      <option value="BR">🇧🇷 BRL</option>
      <option value="MX">🇲🇽 MXN</option>
      <option value="CL">🇨🇱 CLP</option>
      <option value="GB">🇬🇧 GBP</option>
      <option value="DE">🇪🇺 EUR</option>
      <option value="AU">🇦🇺 AUD</option>
      <option value="CA">🇨🇦 CAD</option>
    </select>
  </div>
</header>

<section class="hero">
  <h1>Encuentra las Mejores Ofertas</h1>
  <p>Precios en tiempo real, descuentos activos y mínimos históricos de Steam</p>
  <div class="hero-search">
    <input type="search" id="hero-input" placeholder="Buscar juego — ej: Cyberpunk, Elden Ring, GTA..." autocomplete="off" spellcheck="false" autofocus>
    <span class="hero-search-icon">&#9906;</span>
  </div>
</section>

<main class="main">

  <!-- Resultados de búsqueda de texto (sección separada) -->
  <section id="results-section" class="hidden">
    <div class="results-header">
      <div class="section-title" id="results-title">Resultados</div>
      <button class="btn-back" id="btn-back">← Inicio</button>
    </div>
    <div id="results-grid" class="games-grid"></div>
    <div id="results-load-more" class="load-more-wrap hidden">
      <button class="btn-load-more" id="btn-results-more">Cargar más</button>
    </div>
  </section>

  <!-- Home: categorías + géneros -->
  <section id="home-section">

    <!-- Barra de tabs (visible en modo categoría) -->
    <div id="tab-bar" class="home-top-bar">
      <div class="category-tabs">
        <button class="tab-btn active" data-category="specials">Ofertas</button>
      </div>
      <button class="btn-genre-picker" id="btn-open-genres">Géneros</button>
    </div>

    <!-- Barra de chips de género (visible en modo género) -->
    <div id="genre-bar" class="genre-bar hidden">
      <span class="genre-bar-label">Filtrando por</span>
      <div id="active-chips" class="active-chips"></div>
      <button class="btn-add-genre" id="btn-add-genre">+ Agregar</button>
      <button class="btn-clear-genres" id="btn-clear-genres">Limpiar filtros</button>
    </div>

    <div id="featured-grid" class="games-grid"></div>

    <div id="featured-load-more" class="load-more-wrap hidden">
      <button class="btn-load-more" id="btn-featured-more">Cargar más</button>
    </div>

    <div id="genre-steam-link" class="genre-steam-link hidden"></div>

  </section>

</main>

<!-- Dialog géneros -->
<div id="genre-dialog" class="genre-dialog hidden" role="dialog" aria-modal="true">
  <div class="genre-dialog-inner">
    <div class="genre-dialog-header">
      <h2>Explorar por Género</h2>
      <div class="genre-dialog-search-wrap">
        <input type="search" id="genre-search-input" placeholder="Filtrar géneros..." autocomplete="off">
      </div>
      <button class="genre-dialog-close" id="btn-close-genres" aria-label="Cerrar">✕</button>
    </div>
    <div class="genre-dialog-body" id="genre-dialog-body"></div>
  </div>
</div>

<!-- Modal detalle -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
